<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="Царевич и ковёр" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>Царевич и ковёр</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: #050505;
      overflow: hidden;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
      touch-action: none;
      -webkit-user-select: none;
      user-select: none;
    }

    #app {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #050505;
    }

    img {
      max-width: 100vw;
      max-height: 100vh;
      object-fit: contain;
      display: block;
    }

    #hint {
      position: fixed;
      left: 0;
      right: 0;
      bottom: env(safe-area-inset-bottom, 0);
      padding: 10px 14px 14px;
      color: white;
      background: linear-gradient(transparent, rgba(0,0,0,.65));
      font-size: 14px;
      text-align: center;
      opacity: .85;
      pointer-events: none;
    }

    #counter {
      position: fixed;
      top: calc(env(safe-area-inset-top, 0) + 8px);
      right: 10px;
      color: white;
      background: rgba(0,0,0,.45);
      border-radius: 999px;
      padding: 5px 10px;
      font-size: 13px;
      opacity: .75;
    }
  </style>
</head>
<body>
  <div id="app">
    <img id="frame" alt="Кадр диафильма" />
  </div>
  <div id="counter"></div>
  <div id="hint">Тап справа — дальше, слева — назад</div>

  <script>
    // Царевич и ковёр. Часть 1
    // На странице указано 28 кадров.
    const frameCount = 28;
    const baseUrl = "https://diafilmy.su/uploads/posts/2022-02/1644601395_pict-ck-";

    let current = Number(localStorage.getItem("diafilm-current-frame") || 1);
    current = Math.min(Math.max(current, 1), frameCount);

    const img = document.getElementById("frame");
    const counter = document.getElementById("counter");
    const hint = document.getElementById("hint");

    function frameUrl(n) {
      return baseUrl + String(n).padStart(2, "0") + ".jpg";
    }

    function showFrame(n) {
      current = Math.min(Math.max(n, 1), frameCount);
      img.src = frameUrl(current);
      counter.textContent = current + " / " + frameCount;
      localStorage.setItem("diafilm-current-frame", current);

      setTimeout(() => {
        hint.style.opacity = "0";
      }, 2500);
    }

    function next() {
      showFrame(current < frameCount ? current + 1 : frameCount);
    }

    function prev() {
      showFrame(current > 1 ? current - 1 : 1);
    }

    document.addEventListener("click", (e) => {
      if (e.clientX > window.innerWidth / 2) next();
      else prev();
    });

    document.addEventListener("keydown", (e) => {
      if (e.key === "ArrowRight" || e.key === " ") next();
      if (e.key === "ArrowLeft") prev();
    });

    let startX = null;
    document.addEventListener("touchstart", (e) => {
      startX = e.touches[0].clientX;
    }, { passive: true });

    document.addEventListener("touchend", (e) => {
      if (startX === null) return;
      const endX = e.changedTouches[0].clientX;
      const dx = endX - startX;
      if (Math.abs(dx) > 40) {
        if (dx < 0) next();
        else prev();
      }
      startX = null;
    }, { passive: true });

    // Preload next image.
    img.addEventListener("load", () => {
      if (current < frameCount) {
        const preload = new Image();
        preload.src = frameUrl(current + 1);
      }
    });

    showFrame(current);
  </script>
</body>
</html>
