<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="Диафильм">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Диафильм</title>
  <style>
    html, body { margin:0; width:100%; height:100%; background:#000; color:white; overflow:hidden; font-family:system-ui,-apple-system,sans-serif; -webkit-user-select:none; user-select:none; }
    #start { position:fixed; inset:0; display:flex; flex-direction:column; justify-content:center; gap:12px; padding:20px; box-sizing:border-box; background:#111; }
    input, button { font-size:17px; border-radius:12px; border:0; padding:13px 14px; }
    input { background:white; color:black; }
    button { background:#0a84ff; color:white; font-weight:600; }
    #viewer { position:fixed; inset:0; display:none; align-items:center; justify-content:center; background:#000; }
    #frame { max-width:100vw; max-height:100vh; width:auto; height:auto; display:block; }
    #counter { position:fixed; top:calc(env(safe-area-inset-top, 0px) + 8px); right:10px; color:white; background:rgba(0,0,0,.55); border-radius:999px; padding:6px 10px; font-size:14px; }
    #message { position:fixed; left:12px; right:12px; bottom:calc(env(safe-area-inset-bottom, 0px) + 12px); color:white; background:rgba(0,0,0,.65); border-radius:12px; padding:10px 12px; font-size:14px; text-align:center; opacity:1; }
    .small { opacity:.7; font-size:14px; line-height:1.35; }
  </style>
</head>
<body>
  <div id="start">
    <h2>Открыть диафильм</h2>
    <input id="url" placeholder="Вставь ссылку diafilmy.su" autocomplete="off">
    <button id="openBtn">Открыть</button>
    <div class="small">Пример: https://diafilmy.su/8111-carevich-i-kover-chast-1.html<br><br>После открытия: тап справа — дальше, слева — назад.</div>
  </div>

  <div id="viewer">
    <img id="frame" alt="Кадр диафильма">
    <div id="counter"></div>
    <div id="message">Загрузка...</div>
  </div>

  <script>
    const input = document.getElementById("url");
    const openBtn = document.getElementById("openBtn");
    const start = document.getElementById("start");
    const viewer = document.getElementById("viewer");
    const img = document.getElementById("frame");
    const counter = document.getElementById("counter");
    const message = document.getElementById("message");

    let frames = [];
    let current = 0;

    input.value = localStorage.getItem("lastDiafilmUrl") || "";

    function normalizeUrl(url) {
      url = url.trim();
      if (!url.startsWith("http")) url = "https://" + url;
      return url;
    }

    function absoluteUrl(url) {
      if (url.startsWith("//")) return "https:" + url;
      if (url.startsWith("/")) return "https://diafilmy.su" + url;
      return url;
    }

    function extractFrameNumber(url) {
      const filename = url.split("/").pop() || "";
      const matches = filename.match(/[0-9]+/g);
      if (!matches) return 999999;
      return Number(matches[matches.length - 1]);
    }

    function extractFrames(html) {
      const doc = new DOMParser().parseFromString(html, "text/html");
      const found = [];

      doc.querySelectorAll("img, a").forEach(el => {
        const raw = el.getAttribute("src") || el.getAttribute("href") || "";
        const low = raw.toLowerCase();
        if ((low.endsWith(".jpg") || low.endsWith(".jpeg") || low.endsWith(".png") || low.endsWith(".webp")) && raw.includes("/uploads/posts/") && !raw.includes("/thumbs/")) {
          found.push(absoluteUrl(raw));
        }
      });

      const unique = Array.from(new Set(found));
      const likely = unique.filter(u => {
        const low = u.toLowerCase();
        return low.includes("pict") || low.includes("kadr") || low.includes("frame") || low.includes("slide");
      });

      const selected = likely.length ? likely : unique;

      // У diafilmy.su в начале имени файла часто стоит timestamp.
      // Поэтому сортируем по ПОСЛЕДНЕМУ числу в имени файла: 01, 02, 03...
      return selected.sort((a, b) => extractFrameNumber(a) - extractFrameNumber(b));
    }

    async function loadDiafilm(pageUrl) {
      message.style.opacity = "1";
      message.textContent = "Загружаю страницу...";

      const proxyUrl = "https://api.allorigins.win/raw?url=" + encodeURIComponent(pageUrl);
      const response = await fetch(proxyUrl);
      if (!response.ok) throw new Error("Не удалось загрузить страницу");

      const html = await response.text();
      frames = extractFrames(html);
      if (!frames.length) throw new Error("Не нашёл картинки кадров на странице");

      current = 0;
      localStorage.setItem("lastDiafilmUrl", pageUrl);
      start.style.display = "none";
      viewer.style.display = "flex";
      show();
    }

    function show() {
      img.style.display = "block";
      img.src = frames[current];
      counter.textContent = (current + 1) + " / " + frames.length;
    }

    img.onload = () => {
      setTimeout(() => { message.style.opacity = "0"; }, 1800);
      if (current < frames.length - 1) {
        const preload = new Image();
        preload.src = frames[current + 1];
      }
    };

    img.onerror = () => {
      img.style.display = "none";
      message.style.opacity = "1";
      message.textContent = "Кадр не загрузился: " + (current + 1);
    };

    function next() { if (current < frames.length - 1) { current++; show(); } }
    function prev() {
      if (current > 0) { current--; show(); }
      else { viewer.style.display = "none"; start.style.display = "flex"; }
    }

    openBtn.onclick = () => {
      const pageUrl = normalizeUrl(input.value);
      loadDiafilm(pageUrl).catch(err => {
        start.style.display = "flex";
        viewer.style.display = "none";
        alert(err.message + "Если сайт/прокси временно блокирует загрузку, попробуй ещё раз через минуту.");
      });
    };

    document.addEventListener("click", (e) => {
      if (viewer.style.display !== "flex") return;
      if (e.clientX > window.innerWidth / 2) next(); else prev();
    });

    let startX = null;
    document.addEventListener("touchstart", (e) => { startX = e.touches[0].clientX; }, { passive: true });
    document.addEventListener("touchend", (e) => {
      if (viewer.style.display !== "flex" || startX === null) return;
      const dx = e.changedTouches[0].clientX - startX;
      if (Math.abs(dx) > 40) { if (dx < 0) next(); else prev(); }
      startX = null;
    }, { passive: true });
  </script>
</body>
</html>
