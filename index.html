<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="Царевич и ковёр" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>Царевич и ковёр</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: #050505;
      overflow: hidden;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
      touch-action: none;
      -webkit-user-select: none;
      user-select: none;
    }

    #app {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #050505;
    }

    img {
      max-width: 100vw;
      max-height: 100vh;
      object-fit: contain;
      display: block;
    }

    #hint {
      position: fixed;
      left: 0;
      right: 0;
      bottom: env(safe-area-inset-bottom, 0);
      padding: 10px 14px 14px;
      color: white;
      background: linear-gradient(transparent, rgba(0,0,0,.65));
      font-size: 14px;
      text-align: center;
      opacity: .85;
      pointer-events: none;
    }

    #counter {
      position: fixed;
      top: calc(env(safe-area-inset-top, 0) + 8px);
      right: 10px;
      color: white;
      background: rgba(0,0,0,.45);
      border-radius: 999px;
      padding: 5px 10px;
      font-size: 13px;
      opacity: .75;
    }
  </style>
</head>
<body>
  <div id="app">
    <img id="frame" alt="Кадр диафильма" />
  </div>
  <div id="counter"></div>
  <div id="hint">Тап справа — дальше, слева — назад</div>

  <script>
    // Царевич и ковёр. Часть 1
    // На странице указано 28 кадров.
    const frames = [
      "https://diafilmy.su/uploads/posts/2022-02/1644601395_pict-ck-01.jpg",
      "https://diafilmy.su/uploads/posts/2022-02/1644601342_pict-ck-02.jpg",
      "https://diafilmy.su/uploads/posts/2022-02/1644601303_pict-ck-03.jpg",
      "https://diafilmy.su/uploads/posts/2022-02/1644601310_pict-ck-04.jpg",
      "https://diafilmy.su/uploads/posts/2022-02/1644601321_pict-ck-05.jpg",
      "https://diafilmy.su/uploads/posts/2022-02/1644601383_pict-ck-06.jpg",
      "https://diafilmy.su/uploads/posts/2022-02/1644601311_pict-ck-07.jpg",
      "https://diafilmy.su/uploads/posts/2022-02/1644601399_pict-ck-08.jpg",
      "https://diafilmy.su/uploads/posts/2022-02/1644601395_pict-ck-09.jpg",
      "https://diafilmy.su/uploads/posts/2022-02/1644601413_pict-ck-10.jpg",
      "https://diafilmy.su/uploads/posts/2022-02/1644601396_pict-ck-11.jpg",
      "https://diafilmy.su/uploads/posts/2022-02/1644601356_pict-ck-12.jpg",
      "https://diafilmy.su/uploads/posts/2022-02/1644601368_pict-ck-13.jpg",
      "https://diafilmy.su/uploads/posts/2022-02/1644601415_pict-ck-14.jpg",
      "https://diafilmy.su/uploads/posts/2022-02/1644601366_pict-ck-15.jpg",
      "https://diafilmy.su/uploads/posts/2022-02/1644601359_pict-ck-16.jpg",
      "https://diafilmy.su/uploads/posts/2022-02/1644601354_pict-ck-17.jpg",
      "https://diafilmy.su/uploads/posts/2022-02/1644601411_pict-ck-18.jpg",
      "https://diafilmy.su/uploads/posts/2022-02/1644601411_pict-ck-19.jpg",
      "https://diafilmy.su/uploads/posts/2022-02/1644601374_pict-ck-20.jpg",
      "https://diafilmy.su/uploads/posts/2022-02/1644601358_pict-ck-21.jpg",
      "https://diafilmy.su/uploads/posts/2022-02/1644601441_pict-ck-22.jpg",
      "https://diafilmy.su/uploads/posts/2022-02/1644601363_pict-ck-23.jpg",
      "https://diafilmy.su/uploads/posts/2022-02/1644601446_pict-ck-24.jpg",
      "https://diafilmy.su/uploads/posts/2022-02/1644601356_pict-ck-25.jpg",
      "https://diafilmy.su/uploads/posts/2022-02/1644601359_pict-ck-26.jpg",
      "https://diafilmy.su/uploads/posts/2022-02/1644601434_pict-ck-27.jpg",
      "https://diafilmy.su/uploads/posts/2022-02/1644601413_pict-ck-28.jpg",
      "https://diafilmy.su/uploads/posts/2022-02/1644601412_pict-ck-29.jpg",
      "https://diafilmy.su/uploads/posts/2022-02/1644601391_pict-ck-30.jpg",
      "https://diafilmy.su/uploads/posts/2022-02/1644601431_pict-ck-31.jpg",
      "https://diafilmy.su/uploads/posts/2022-02/1644601403_pict-ck-32.jpg"
    ];

    const frameCount = frames.length;

    function frameUrl(n) {
      return frames[n - 1];
    }

    function showFrame(n) {
      current = Math.min(Math.max(n, 1), frameCount);
      img.src = frameUrl(current);
      counter.textContent = current + " / " + frameCount;
      localStorage.setItem("diafilm-current-frame", current);

      setTimeout(() => {
        hint.style.opacity = "0";
      }, 2500);
    }

    function next() {
      showFrame(current < frameCount ? current + 1 : frameCount);
    }

    function prev() {
      showFrame(current > 1 ? current - 1 : 1);
    }

    document.addEventListener("click", (e) => {
      if (e.clientX > window.innerWidth / 2) next();
      else prev();
    });

    document.addEventListener("keydown", (e) => {
      if (e.key === "ArrowRight" || e.key === " ") next();
      if (e.key === "ArrowLeft") prev();
    });

    let startX = null;
    document.addEventListener("touchstart", (e) => {
      startX = e.touches[0].clientX;
    }, { passive: true });

    document.addEventListener("touchend", (e) => {
      if (startX === null) return;
      const endX = e.changedTouches[0].clientX;
      const dx = endX - startX;
      if (Math.abs(dx) > 40) {
        if (dx < 0) next();
        else prev();
      }
      startX = null;
    }, { passive: true });

    // Preload next image.
    img.addEventListener("load", () => {
      if (current < frameCount) {
        const preload = new Image();
        preload.src = frameUrl(current + 1);
      }
    });

    showFrame(current);
  </script>
</body>
</html>
