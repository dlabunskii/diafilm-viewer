<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="Царевич и ковёр">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Царевич и ковёр</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      background: #000;
      overflow: hidden;
      font-family: system-ui, -apple-system, sans-serif;
      -webkit-user-select: none;
      user-select: none;
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #frame {
      max-width: 100vw;
      max-height: 100vh;
      width: auto;
      height: auto;
      display: block;
    }

    #counter {
      position: fixed;
      top: calc(env(safe-area-inset-top, 0px) + 8px);
      right: 10px;
      color: white;
      background: rgba(0,0,0,.55);
      border-radius: 999px;
      padding: 6px 10px;
      font-size: 14px;
    }

    #message {
      position: fixed;
      left: 12px;
      right: 12px;
      bottom: calc(env(safe-area-inset-bottom, 0px) + 12px);
      color: white;
      background: rgba(0,0,0,.65);
      border-radius: 12px;
      padding: 10px 12px;
      font-size: 14px;
      text-align: center;
    }
  </style>
</head>
<body>
  <img id="frame" alt="Кадр диафильма">
  <div id="counter"></div>
  <div id="message">Тап справа — дальше, слева — назад</div>

  <script>
    const frames = [
      "https://diafilmy.su/uploads/posts/2022-02/1644601395_pict-ck-01.jpg",
      "https://diafilmy.su/uploads/posts/2022-02/1644601342_pict-ck-02.jpg",
      "https://diafilmy.su/uploads/posts/2022-02/1644601303_pict-ck-03.jpg",
      "https://diafilmy.su/uploads/posts/2022-02/1644601310_pict-ck-04.jpg",
      "https://diafilmy.su/uploads/posts/2022-02/1644601321_pict-ck-05.jpg",
      "https://diafilmy.su/uploads/posts/2022-02/1644601383_pict-ck-06.jpg",
      "https://diafilmy.su/uploads/posts/2022-02/1644601311_pict-ck-07.jpg",
      "https://diafilmy.su/uploads/posts/2022-02/1644601399_pict-ck-08.jpg",
      "https://diafilmy.su/uploads/posts/2022-02/1644601395_pict-ck-09.jpg",
      "https://diafilmy.su/uploads/posts/2022-02/1644601413_pict-ck-10.jpg",
      "https://diafilmy.su/uploads/posts/2022-02/1644601396_pict-ck-11.jpg",
      "https://diafilmy.su/uploads/posts/2022-02/1644601356_pict-ck-12.jpg",
      "https://diafilmy.su/uploads/posts/2022-02/1644601368_pict-ck-13.jpg"
    ];

    const img = document.getElementById("frame");
    const counter = document.getElementById("counter");
    const message = document.getElementById("message");

    let current = 0;

    function show() {
      img.style.display = "block";
      img.src = frames[current];
      counter.textContent = `${current + 1} / ${frames.length}`;
      message.textContent = "Тап справа — дальше, слева — назад";
    }

    img.onload = () => {
      message.textContent = "Тап справа — дальше, слева — назад";
      setTimeout(() => {
        message.style.opacity = "0";
      }, 2000);
    };

    img.onerror = () => {
      img.style.display = "none";
      message.style.opacity = "1";
      message.textContent = "Кадр не загрузился. Номер: " + (current + 1);
    };

    function next() {
      if (current < frames.length - 1) {
        current++;
        message.style.opacity = "1";
        show();
      }
    }

    function prev() {
      if (current > 0) {
        current--;
        message.style.opacity = "1";
        show();
      }
    }

    document.addEventListener("click", (e) => {
      if (e.clientX > window.innerWidth / 2) next();
      else prev();
    });

    let startX = null;
    document.addEventListener("touchstart", (e) => {
      startX = e.touches[0].clientX;
    }, { passive: true });

    document.addEventListener("touchend", (e) => {
      if (startX === null) return;
      const dx = e.changedTouches[0].clientX - startX;
      if (Math.abs(dx) > 40) {
        if (dx < 0) next();
        else prev();
      }
      startX = null;
    }, { passive: true });

    show();
  </script>
</body>
</html>
